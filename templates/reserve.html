{% extends "base.html" %}

{% block title %}Reserve — Virasat{% endblock %}

{% block content %}

<!-- Page Hero -->
<section class="relative pt-32 pb-10 text-center m-2 sm:m-4 rounded-[2rem] sm:rounded-[3rem] overflow-hidden">
  <div class="absolute inset-0 bg-shader z-[-1]"></div>
  <div class="max-w-3xl mx-auto px-6 relative z-10">
    <span class="section-label">Join Us</span>
    <h1 class="font-fraunces text-white mb-4" style="font-size:clamp(2.5rem,6vw,4.5rem); line-height:1.1;">Reserve a Table</h1>
    <p class="font-jakarta font-light text-gray-400 max-w-md mx-auto">Secure your table for an unforgettable modern Indian dining experience.</p>
  </div>
</section>

<!-- Content -->
<section class="pb-24">
  <div class="max-w-4xl mx-auto px-6 sm:px-10">
    
    <div class="bg-bg-card border border-border-dark rounded-[2rem] p-8 sm:p-12 shadow-2xl reveal-up">
      
      <!-- Form -->
      <form id="reservation-form" action="/api/reserve" method="POST" class="space-y-8">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <!-- Anti-spam Honeypot -->
        <div style="display:none;" aria-hidden="true">
          <label for="website_url">Website</label>
          <input type="text" name="website_url" id="website_url" tabindex="-1" autocomplete="off">
        </div>
        <input type="hidden" name="js_timestamp" id="js_timestamp" value="">
        <script>document.getElementById('js_timestamp').value = Date.now();</script>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label for="res-name" class="form-label">Full Name</label>
            <input type="text" id="res-name" name="name" placeholder="John Doe" class="form-input" required />
            <span class="text-red-400 text-xs mt-1 hidden" id="err-name"></span>
          </div>
          <div>
            <label for="res-email" class="form-label">Email Address</label>
            <input type="email" id="res-email" name="email" placeholder="john@example.com" class="form-input" required />
            <span class="text-red-400 text-xs mt-1 hidden" id="err-email"></span>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label for="res-phone" class="form-label">Phone Number</label>
            <input type="tel" id="res-phone" name="phone" placeholder="+91 98765 43210" class="form-input" required />
            <span class="text-red-400 text-xs mt-1 hidden" id="err-phone"></span>
          </div>
          <div>
            <label for="res-guests" class="form-label">Number of Guests</label>
            <select id="res-guests" name="guests" class="form-input appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%239CA3AF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-no-repeat bg-[length:12px_12px] bg-[right_1.25rem_center]" required>
              <option value="" disabled selected>Select</option>
              <option value="1">1 Guest</option>
              <option value="2">2 Guests</option>
              <option value="3">3 Guests</option>
              <option value="4">4 Guests</option>
              <option value="5">5 Guests</option>
              <option value="6">6+ Guests</option>
            </select>
            <span class="text-red-400 text-xs mt-1 hidden" id="err-guests"></span>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label for="res-date" class="form-label">Date</label>
            <input type="date" id="res-date" name="date" class="form-input" required />
            <span class="text-red-400 text-xs mt-1 hidden" id="err-date"></span>
          </div>
          <div>
            <label for="res-time" class="form-label">Time</label>
            <select id="res-time" name="time_slot" class="form-input appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%239CA3AF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-no-repeat bg-[length:12px_12px] bg-[right_1.25rem_center]" required>
              <option value="" disabled selected>Select time</option>
              <optgroup label="Lunch">
                {% for slot in time_slots[:6] %}<option value="{{ slot }}">{{ slot }}</option>{% endfor %}
              </optgroup>
              <optgroup label="Dinner">
                {% for slot in time_slots[6:] %}<option value="{{ slot }}">{{ slot }}</option>{% endfor %}
              </optgroup>
            </select>
            <span class="text-red-400 text-xs mt-1 hidden" id="err-time_slot"></span>
          </div>
        </div>

        <div>
          <label for="res-special" class="form-label">Special Requests <span class="text-gray-500 font-normal ml-1">(Optional)</span></label>
          <textarea id="res-special" name="special_requests" rows="3" placeholder="Dietary requirements, special occasions..." class="form-input resize-none"></textarea>
        </div>

        <div class="pt-4 flex flex-col items-center">
          <button type="submit" id="reserve-submit" class="btn-primary w-full md:w-auto px-12 py-3.5">
            <span id="reserve-btn-text">Confirm Reservation</span>
          </button>
          <p class="text-gray-500 text-xs mt-4">By booking, you agree to our cancellation policy.</p>
        </div>

      </form>
    </div>

  </div>
</section>

{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/reserve.js') }}"></script>
{% endblock %}
